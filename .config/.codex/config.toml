service_tier = "default"
model = "gpt-5.5"
model_reasoning_effort = "medium"
[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp"]
default_tools_approval_mode = "approve"

[mcp_servers.sem]
command = "sem-mcp"
args = []
default_tools_approval_mode = "approve"

[mcp_servers.inspect]
command = "inspect-mcp"
args = []
default_tools_approval_mode = "approve"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_TOKEN"
