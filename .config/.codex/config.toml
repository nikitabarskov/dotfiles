model = "gpt-5.5"
model_provider = "headroom"
model_reasoning_effort = "medium"
openai_base_url = "http://127.0.0.1:8787/v1"
service_tier = "default"

[mcp_servers.codegraph]
args = ["serve", "--mcp"]
command = "codegraph"
default_tools_approval_mode = "approve"

[mcp_servers.sem]
command = "sem"
args = ["mcp"]
default_tools_approval_mode = "approve"

[mcp_servers.inspect]
command = "inspect-mcp"
args = []
default_tools_approval_mode = "approve"

[mcp_servers.headroom]
command = "headroom"
args = ["mcp", "serve"]
default_tools_approval_mode = "approve"

[mcp_servers.github]
bearer_token_env_var = "GITHUB_TOKEN"
default_tools_approval_mode = "approve"
url = "https://api.githubcopilot.com/mcp/"

[mcp_servers.headroom]
args = ["mcp", "serve"]
command = "headroom"
default_tools_approval_mode = "approve"

[mcp_servers.inspect]
args = []
command = "inspect-mcp"
default_tools_approval_mode = "approve"

[mcp_servers.sem]
args = ["mcp"]
command = "sem"
default_tools_approval_mode = "approve"

[mcp_servers.tokensave]
args = ["serve"]
command = "tokensave"
default_tools_approval_mode = "approve"

[model_providers.headroom]
base_url = "http://127.0.0.1:8787/v1"
name = "OpenAI via Headroom proxy"
requires_openai_auth = true
supports_websockets = true

[model_providers.headroom.env_http_headers]
X-Headroom-Project = "HEADROOM_PROJECT"

[projects."/Users/nikitabarskov"]
trust_level = "trusted"

[projects."/Users/nikitabarskov/gh/infra"]
trust_level = "trusted"

[projects."/Users/nikitabarskov/gh/surgery-planning"]
trust_level = "trusted"

[projects."/Users/nikitabarskov/personal/dotfiles"]
trust_level = "trusted"

[projects."/Users/nikitabarskov/personal/hirn.studio/sowai"]
trust_level = "trusted"

[projects."/home/nikitabarskov/personal/dotfiles"]
trust_level = "trusted"

[projects."/home/nikitabarskov/personal/hirn.studio/sowai"]
trust_level = "trusted"

[projects."~/gh"]
trust_level = "trusted"

[projects."~/personal"]
trust_level = "trusted"

[projects."~/work"]
trust_level = "trusted"

