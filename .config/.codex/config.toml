model = "gpt-5.6-luna"
model_reasoning_effort = "medium"
service_tier = "default"

[mcp_servers.codegraph]
args = ["serve", "--mcp"]
command = "codegraph"
default_tools_approval_mode = "approve"

[mcp_servers.headroom]
args = ["mcp", "serve"]
command = "headroom"
default_tools_approval_mode = "approve"

[mcp_servers.inspect]
command = "inspect-mcp"
default_tools_approval_mode = "approve"

[mcp_servers.linear]
default_tools_approval_mode = "approve"
url = "https://mcp.linear.app/mcp"

[mcp_servers.sem]
command = "sem-mcp"
default_tools_approval_mode = "approve"

[mcp_servers.tokensave]
args = ["serve"]
command = "tokensave"
default_tools_approval_mode = "approve"

