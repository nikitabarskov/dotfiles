service_tier = "default"
model = "gpt-5.5"
model_reasoning_effort = "medium"
[mcp_servers.codegraph]
command = "mise"
args = [
	"exec",
	"npm:@colbymchenry/codegraph",
	"--",
	"codegraph",
	"serve",
	"--mcp",
]
default_tools_approval_mode = "approve"

[mcp_servers.sem]
command = "mise"
args = ["exec", "cargo:https://github.com/Ataraxy-Labs/sem", "--", "sem", "mcp"]
default_tools_approval_mode = "approve"

[mcp_servers.inspect]
command = "inspect-mcp"
args = []
default_tools_approval_mode = "approve"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_TOKEN"
default_tools_approval_mode = "approve"

[projects."~/personal"]
trust_level = "trusted"

[projects."~/gh"]
trust_level = "trusted"

[projects."~/work"]
trust_level = "trusted"

[projects."/Users/nikitabarskov/personal/dotfiles"]
trust_level = "trusted"

[projects."/Users/nikitabarskov/gh/infra"]
trust_level = "trusted"

[tui.model_availability_nux]
"gpt-5.5" = 4
