model = "gpt-5.5"
model_reasoning_effort = "medium"
service_tier = "default"

[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp"]
default_tools_approval_mode = "approve"

[mcp_servers.sem]
command = "sem"
args = ["mcp"]
default_tools_approval_mode = "approve"

[mcp_servers.inspect]
command = "inspect-mcp"
default_tools_approval_mode = "approve"

[mcp_servers.headroom]
command = "headroom"
args = ["mcp", "serve"]
default_tools_approval_mode = "approve"

[mcp_servers.tokensave]
command = "tokensave"
args = ["serve"]
default_tools_approval_mode = "approve"

[mcp_servers.linear]
